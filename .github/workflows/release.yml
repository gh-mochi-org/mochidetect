name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mochidetect
            archive: mochidetect-linux-x86_64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mochidetect
            archive: mochidetect-linux-aarch64.tar.gz
            use_cross: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mochidetect
            archive: mochidetect-macos-x86_64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mochidetect
            archive: mochidetect-macos-aarch64.tar.gz

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mochidetect.exe
            archive: mochidetect-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (tar.gz — Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}
          cd -

      - name: Package (zip — Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Create GitHub Release ─────────────────────────────────────────────────

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: mochidetect ${{ steps.changelog.outputs.tag }}
          body: |
            ## 🍡 mochidetect ${{ steps.changelog.outputs.tag }}

            ### Install

            **Linux (x86_64)**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.tag }}/mochidetect-linux-x86_64.tar.gz
            tar xzf mochidetect-linux-x86_64.tar.gz
            chmod +x mochidetect && sudo mv mochidetect /usr/local/bin/
            ```

            **macOS (Apple Silicon)**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.tag }}/mochidetect-macos-aarch64.tar.gz
            tar xzf mochidetect-macos-aarch64.tar.gz
            chmod +x mochidetect && sudo mv mochidetect /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.tag }}/mochidetect-macos-x86_64.tar.gz
            tar xzf mochidetect-macos-x86_64.tar.gz
            chmod +x mochidetect && sudo mv mochidetect /usr/local/bin/
            ```

            **Windows** — download `mochidetect-windows-x86_64.zip` below and add to PATH.

            ### Or build from source
            ```bash
            cargo install --git https://github.com/${{ github.repository }}
            ```
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.tag, '-') }}
          files: artifacts/*

